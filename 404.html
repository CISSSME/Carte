<style>
  :root{
    --navy:#0f2240; --navy2:#1a3558; --blue:#3b82c4; --blue-lt:#dbeafe;
    --cream:#f8f6f1; --white:#fff; --border:#ddd5c4; --muted:#64748b;
    --orange:#ee2d62; --green:#16a34a;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; min-height:100%;
    font-family:'Lato',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    color:var(--navy2);
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(59,130,196,.16), rgba(248,246,241,0) 60%),
      var(--cream);
    display:flex; align-items:center; justify-content:center; padding:28px 20px;
  }
  .wrap{ width:100%; max-width:540px; text-align:center; animation:rise .7s cubic-bezier(.2,.7,.2,1) both; }
  .brand{ display:inline-flex; align-items:center; gap:11px; margin-bottom:30px; }
  .brand img{ width:46px; height:46px; display:block; animation:logofloat 4.5s ease-in-out infinite; }
  .brand .bt{ text-align:left; line-height:1.12; }
  .brand .bt b{ font-family:'Raleway',sans-serif; font-weight:800; font-size:15px; color:var(--navy); letter-spacing:.01em; display:block; }
  .brand .bt span{ font-size:11px; color:var(--muted); letter-spacing:.04em; }

  .code{ display:flex; align-items:center; justify-content:center; gap:6px; margin:6px 0 4px; }
  .code .d{ font-family:'Raleway',sans-serif; font-weight:800; font-size:118px; line-height:1; color:var(--navy);
    text-shadow:0 2px 0 rgba(15,34,64,.06); }

  .pin-wrap{ position:relative; width:96px; height:118px; display:flex; align-items:flex-start; justify-content:center; }
  .pin{ position:relative; z-index:2; animation:bob 2.8s ease-in-out infinite; }
  .pin svg{ display:block; filter:drop-shadow(0 6px 7px rgba(15,34,64,.20)); }
  .ripple{ position:absolute; left:50%; bottom:8px; width:54px; height:16px; transform:translateX(-50%);
    border-radius:50%; background:rgba(238,45,98,.30); z-index:1; animation:ripple 2.8s ease-out infinite; }

  h1{ font-family:'Raleway',sans-serif; font-weight:800; font-size:27px; color:var(--navy); margin:14px 0 8px; }
  p.lead{ font-size:15.5px; line-height:1.6; color:var(--navy2); margin:0 auto 28px; max-width:430px; }

  .btn{ display:inline-flex; align-items:center; gap:9px; text-decoration:none;
    background:var(--navy); color:#fff; font-family:'Raleway',sans-serif; font-weight:700; font-size:15px;
    padding:13px 26px; border-radius:11px; box-shadow:0 6px 18px rgba(15,34,64,.22);
    transition:transform .15s ease, background .15s ease, box-shadow .15s ease; }
  .btn:hover{ background:var(--navy2); transform:translateY(-2px); box-shadow:0 9px 22px rgba(15,34,64,.28); }
  .btn:active{ transform:translateY(0); }
  .btn svg{ width:17px; height:17px; }

  .foot{ margin-top:34px; font-size:11.5px; color:var(--muted); }
  .foot .dotsep{ color:var(--orange); margin:0 6px; }

  @keyframes rise{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }
  @keyframes bob{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-9px);} }
  @keyframes ripple{ 0%{transform:translateX(-50%) scale(.55); opacity:.45;} 70%{opacity:.10;} 100%{transform:translateX(-50%) scale(1.55); opacity:0;} }
  @keyframes logofloat{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-4px);} }

  @media (max-width:420px){
    .code .d{ font-size:90px; } .pin-wrap{ width:74px; height:92px; } .pin svg{ width:60px; height:auto; }
    .ripple{ width:42px; bottom:6px; } h1{ font-size:23px; } .brand{ margin-bottom:24px; }
  }
  @media (prefers-reduced-motion: reduce){
    .wrap,.brand img,.pin,.ripple{ animation:none !important; }
    .ripple{ opacity:.22; transform:translateX(-50%) scale(1); }
  }
</style>
</head>
